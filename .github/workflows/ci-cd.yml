name: CI/CD - Project 001

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: project-001-api

jobs:
  ci:
    name: CI - Lint and Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install lint tools
        run: pip install ruff==0.5.5 isort==5.13.2

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

      - name: isort check
        run: isort --check-only app/

      - name: Basic import check
        env:
          PG_HOST: localhost
          PG_PORT: "5432"
          PG_USER: platform
          PG_PASSWORD: platform123
          PG_DB: ai_platform
          LLM_API_KEY: dummy
        run: |
          pip install fastapi sqlalchemy pydantic openai python-dotenv psycopg2-binary
          python -c "from app.main import app; print('Import OK')"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o response.json -w "%{http_code}" | tee status_code.txt
          STATUS=$(cat status_code.txt)
          echo "Render API response:"
          cat response.json
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "Failed to trigger Render deploy: HTTP $STATUS"
            exit 1
          fi
          echo "Deploy triggered successfully"

      - name: Wait for Render deployment
        run: |
          echo "Waiting 90s for Render to build and deploy..."
          sleep 90

      - name: Health Check
        run: |
          echo "Checking health at ${{ secrets.RENDER_URL }}/health ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_URL }}/health")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 15
          done
          echo "Health check FAILED after 5 attempts"
          exit 1