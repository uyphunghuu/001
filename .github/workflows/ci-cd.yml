name: CI/CD - Project 001

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: project-001-api

jobs:
  ci:
    name: CI - Lint and Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install lint tools
        run: pip install ruff==0.5.5 isort==5.13.2

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

      - name: isort check
        run: isort --check-only app/

      - name: Basic import check
        env:
          PG_HOST: localhost
          PG_PORT: "5432"
          PG_USER: platform
          PG_PASSWORD: platform123
          PG_DB: ai_platform
          LLM_API_KEY: dummy
        run: |
          pip install fastapi sqlalchemy pydantic openai python-dotenv psycopg2-binary
          python -c "from app.main import app; print('Import OK')"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }} --detach

      - name: Wait for deployment
        run: sleep 30

      - name: Health Check
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${RAILWAY_URL}/health")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 10
          done
          echo "Health check FAILED"
          exit 1