# AI Platform Alert Rules
groups:
  - name: ai_platform_pipeline
    interval: 30s
    rules:
      # ─── Silver Pipeline ────────────────────────────────────────────
      - alert: SilverPipelineHighFailureRate
        expr: |
          rate(silver_source_failed_total[5m]) 
          / 
          (rate(silver_source_processed_total[5m]) + rate(silver_source_failed_total[5m]))
          > 0.1
        for: 5m
        labels:
          severity: critical
          layer: silver
        annotations:
          summary: "Silver pipeline failure rate > 10%"
          description: "Silver pipeline failure rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: SilverPipelineStalled
        expr: |
          time() - silver_freshness_seconds > 86400
        for: 10m
        labels:
          severity: warning
          layer: silver
        annotations:
          summary: "Silver pipeline stalled for > 24 hours"
          description: "Last Silver pipeline run was {{ $value | humanizeDuration }} ago"

      - alert: SilverContractViolation
        expr: |
          rate(silver_contract_violations_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          layer: silver
        annotations:
          summary: "Silver data contract violations detected"
          description: "Data contract violations are occurring in the Silver pipeline"

      - alert: SilverSchemaViolation
        expr: |
          rate(silver_schema_violations_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          layer: silver
        annotations:
          summary: "Silver schema violations detected"
          description: "Schema validation errors in Silver pipeline"

      # ─── Gold Pipeline ─────────────────────────────────────────────
      - alert: GoldPipelineEmbeddingStale
        expr: |
          time() - gold_embedding_freshness_seconds > 604800  # 7 days
        for: 10m
        labels:
          severity: warning
          layer: gold
        annotations:
          summary: "Gold embeddings stale for > 7 days"
          description: "Gold node embeddings were last updated {{ $value | humanizeDuration }} ago"

      - alert: GoldNodeWithoutEmbedding
        expr: |
          gold_nodes_without_embedding > 0.05 * gold_nodes_total
        for: 5m
        labels:
          severity: warning
          layer: gold
        annotations:
          summary: "> 5% of Gold nodes missing embeddings"
          description: "{{ $value | humanize }} nodes without embeddings out of {{ $labels.total }} total"

      # ─── RAG ────────────────────────────────────────────────────────
      - alert: RAGOrphanChunks
        expr: |
          rag_orphan_chunks > 0
        for: 5m
        labels:
          severity: warning
          layer: rag
        annotations:
          summary: "Orphan chunks detected in RAG"
          description: "{{ $value }} chunks have no valid parent node"

      - alert: RAGCorpusStale
        expr: |
          rag_corpus_freshness_hours > 24
        for: 10m
        labels:
          severity: warning
          layer: rag
        annotations:
          summary: "RAG corpus stale for > 24 hours"
          description: "RAG corpus was last indexed {{ $value }} hours ago"

      - alert: RAGEmbeddingDrift
        expr: |
          rag_embedding_mean_shift > 0.1
        for: 5m
        labels:
          severity: warning
          layer: rag
        annotations:
          summary: "RAG embedding drift detected"
          description: "Embedding mean shift is {{ $value }} (threshold: 0.1)"

      # ─── Agent ──────────────────────────────────────────────────────
      - alert: AgentHighHallucinationRate
        expr: |
          avg_over_time(agent_hallucination_score[30m]) > 0.5
        for: 5m
        labels:
          severity: critical
          layer: ai
        annotations:
          summary: "Agent hallucination score > 0.5"
          description: "Average hallucination score over 30 minutes is {{ $value }}"

      - alert: AgentHighFailureRate
        expr: |
          rate(agent_execution_failures_total[5m]) > 0.2
        for: 5m
        labels:
          severity: critical
          layer: ai
        annotations:
          summary: "Agent execution failure rate > 20%"
          description: "Agent failure rate is {{ $value }} per second"

      - alert: AgentLatencySpike
        expr: |
          histogram_quantile(0.95, rate(agent_execution_latency_ms_bucket[5m])) > 30000
        for: 5m
        labels:
          severity: warning
          layer: ai
        annotations:
          summary: "Agent p95 latency > 30s"
          description: "95th percentile agent latency is {{ $value }}ms"

      - alert: AgentCostSpike
        expr: |
          rate(agent_total_cost_usd_total[1h]) > 10
        for: 5m
        labels:
          severity: warning
          layer: ai
        annotations:
          summary: "Agent cost > $10/hour"
          description: "Agent API cost is ${{ $value }}/hour"

      # ─── Database ───────────────────────────────────────────────────
      - alert: PostgreSQLConnectionPoolExhausted
        expr: |
          db_pool_checkedout / (db_pool_size + db_pool_overflow) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool > 80% utilized"
          description: "Connection pool is at {{ $value | humanizePercentage }} capacity"

      - alert: PostgreSQLHighQueryLatency
        expr: |
          histogram_quantile(0.95, rate(db_query_duration_ms_bucket[5m])) > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL p95 query latency > 5s"
          description: "95th percentile query latency is {{ $value }}ms"

      - alert: DatabaseDown
        expr: |
          pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database is down"
          description: "PostgreSQL instance {{ $labels.instance }} is unreachable"
