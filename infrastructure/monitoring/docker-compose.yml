# Docker Compose for AI Platform Observability Stack
# 
# Services:
#   - Prometheus: Metrics collection and alerting
#   - Pushgateway: Accepts short-lived job metrics
#   - Grafana: Dashboards and visualization
#   - pg_exporter: PostgreSQL metrics
#   - node_exporter: System metrics
#
# Usage:
#   docker-compose -f infrastructure/monitoring/docker-compose.yml up -d
#   Access Grafana at http://localhost:3000 (admin/admin)
#   Access Prometheus at http://localhost:9090
version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ai_platform_prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - ai_platform_monitoring

  pushgateway:
    image: prom/pushgateway:latest
    container_name: ai_platform_pushgateway
    ports:
      - "9091:9091"
    restart: unless-stopped
    networks:
      - ai_platform_monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: ai_platform_grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/ai_platform_overview.json
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - ai_platform_monitoring
    depends_on:
      - prometheus

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ai_platform_pg_exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://platform:platform123@host.docker.internal:5433/ai_platform?sslmode=disable
    ports:
      - "9187:9187"
    restart: unless-stopped
    networks:
      - ai_platform_monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"

  node_exporter:
    image: prom/node-exporter:latest
    container_name: ai_platform_node_exporter
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - ai_platform_monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  ai_platform_monitoring:
    driver: bridge
