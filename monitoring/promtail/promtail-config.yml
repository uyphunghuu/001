server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: fastapi_app
    static_configs:
      - targets: []
        labels:
          job: fastapi_app
          service: ai-platform
          layer: app
          __path__: /var/log/ai-platform/*.log

  - job_name: docker
    pipeline_stages:
      - docker: {}
    static_configs:
      - targets: []
        labels:
          job: docker
          service: ai-platform
          __path__: /var/lib/docker/containers/*/*-json.log

  - job_name: system
    static_configs:
      - targets: []
        labels:
          job: system
          service: ai-platform
          __path__: /var/log/syslog
