global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts/*.yml"

remote_write:
  - url: "https://${GC_INSTANCE_ID}.grafana.net/api/prom/push"
    basic_auth:
      username: "${GC_INSTANCE_ID}"
      password: "${GC_API_KEY}"
    remote_timeout: 30s
    queue_config:
      capacity: 10000
      max_shards: 10
      min_shards: 1

scrape_configs:
  - job_name: "fastapi_app"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          component: api
          layer: app
          service: ai-platform

  - job_name: "postgresql"
    static_configs:
      - targets: ["host.docker.internal:9187"]
        labels:
          component: database
          service: ai-platform

  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          component: system
          service: ai-platform

  - job_name: "cadvisor"
    static_configs:
      - targets: ["host.docker.internal:8088"]
        labels:
          component: containers
          service: ai-platform

  - job_name: "minio"
    metrics_path: /minio/health/live
    static_configs:
      - targets: ["host.docker.internal:9000"]
        labels:
          layer: bronze
          component: storage
          service: ai-platform

  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
        labels:
          component: pushgateway
          service: ai-platform
